name: Sync External Repo

on:
  workflow_dispatch:
  schedule:
   - cron: '0 0 * * 0'  # weekly

  permissions:
  contents: write

  jobs:
    sync:
      runs-on: ubuntu-latest

  jobs:
    sync:
      runs-on: ubuntu-latest
      steps:
  - name: Checkout main repo
    uses: actions/checkout@v4

  - name: Clone or update external repo
    run: |
      if [ -d "external/agent-prompt/.git" ]; then
        echo "Repo exists, pulling latest..."
        cd external/agent-prompt
        git fetch origin
        git reset --hard origin/main || git reset --hard origin/master
        cd -
      else
        echo "Cloning repo..."
        git clone https://github.com/fainir/most-capable-agent-system-prompt external/agent-prompt
      fi

  - name: Commit updates (if any)
    run: |
      git config user.name "github-actions"
      git config user.email "actions@github.com"

      git add external/agent-prompt

      if git diff --cached --quiet; then
        echo "No changes to commit"
      else
        git commit -m "chore: sync external agent prompt"
        git push
      fi
